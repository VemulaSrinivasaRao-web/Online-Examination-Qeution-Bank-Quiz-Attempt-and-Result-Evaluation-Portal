<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register - Online Exam Pro</title>
    <div th:replace="~{fragments :: header_links}"></div>
</head>

<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5 pt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-white">Create Account</h2>
                        <p class="text-secondary small">Join the future of online assessments</p>
                    </div>

                    <div th:if="${param.success}" class="alert alert-success bg-success text-white border-0 small">
                        <i class="bi bi-person-check-fill me-2"></i> Registration successful! <a th:href="@{/login}"
                            class="text-white fw-bold">Login here</a>
                    </div>

                    <form th:action="@{/register}" th:object="${user}" method="post" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="fullName" class="form-label text-secondary small">Full Name</label>
                                <input type="text" th:field="*{fullName}" class="form-control" id="fullName"
                                    placeholder="John Doe" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="username" class="form-label text-secondary small">Email Address</label>
                                <input type="email" th:field="*{username}" class="form-control" id="username"
                                    placeholder="john@example.com" required>
                                <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                                    class="text-danger small mt-1"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="mobileNumber" class="form-label text-secondary small">Mobile Number</label>
                                <input type="text" th:field="*{mobileNumber}" class="form-control" id="mobileNumber"
                                    placeholder="+1 234 567 890">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="role" class="form-label text-secondary small">Register As</label>
                                <select th:field="*{role}"
                                    class="form-select bg-transparent border-secondary-subtle text-white" id="role"
                                    required>
                                    <option value="ROLE_STUDENT" class="bg-dark">Student</option>
                                    <option value="ROLE_EXAMINER" class="bg-dark">Examiner</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-secondary small">Password</label>
                            <input type="password" th:field="*{password}" class="form-control" id="password"
                                placeholder="••••••••" required>
                        </div>

                        <div class="mb-4">
                            <label for="profilePicFile" class="form-label text-secondary small">Profile Picture</label>
                            <input type="file" name="profilePicFile" class="form-control" id="profilePicFile"
                                accept="image/*">
                            <div th:if="${fileError}" class="text-danger small mt-1" th:text="${fileError}"></div>
                        </div>

                        <button type="submit" class="btn btn-premium w-100 py-3 mt-2">Create My Account</button>

                        <div class="text-center mt-4">
                            <p class="text-secondary small">Already have an account? <a th:href="@{/login}"
                                    class="text-info fw-semibold text-decoration-none">Login here</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center mt-auto">
        <div class="container text-center">
            <p class="mb-0 text-secondary small">© 2025 Online Exam Pro. Excellence in Evaluation.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
