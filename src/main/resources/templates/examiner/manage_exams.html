<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Exams - Online Exam Pro</title>
    <div th:replace="~{fragments :: header_links}"></div>
</head>

<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5 pt-5">
        <div class="d-flex justify-content-between align-items-center mb-4 animate__animated animate__fadeIn">
            <div>
                <h2 class="fw-bold text-white mb-0">Manage My Exams</h2>
                <p class="text-secondary small">View and manage your assigned examinations</p>
            </div>
            <a th:href="@{/examiner/exam/add}" class="btn btn-premium"><i class="bi bi-plus-lg me-2"></i>Create New
                Exam</a>
        </div>

        <div class="glass-card p-4 animate__animated animate__fadeInUp">
            <div class="table-responsive">
                <table class="table table-hover table-dark bg-transparent">
                    <thead>
                        <tr class="text-secondary small text-uppercase">
                            <th>Exam ID</th>
                            <th>Title</th>
                            <th>Duration (Min)</th>
                            <th>Questions</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-white align-middle">
                        <tr th:each="exam : ${exams}" class="border-secondary-subtle">
                            <td th:text="${exam.id}">1</td>
                            <td class="fw-bold" th:text="${exam.title}">Sample Exam</td>
                            <td th:text="${exam.durationInMinutes}">60</td>
                            <td>
                                <span class="badge bg-info"
                                    th:text="${exam.questions != null ? exam.questions.size() : 0}">0</span>
                            </td>
                            <td>
                                <div class="btn-group">
                                    <a th:href="@{'/admin/exam/manage-questions/' + ${exam.id}}"
                                        class="btn btn-sm btn-outline-info me-2 rounded-pill"><i
                                            class="bi bi-list-check me-1"></i>Questions</a>
                                    <a th:href="@{'/admin/exam/edit/' + ${exam.id}}"
                                        class="btn btn-sm btn-outline-warning me-2 rounded-pill"><i
                                            class="bi bi-pencil me-1"></i>Edit</a>
                                    <a th:href="@{'/admin/exam/delete/' + ${exam.id}}"
                                        class="btn btn-sm btn-outline-danger rounded-pill"
                                        onclick="return confirm('Are you sure?')"><i
                                            class="bi bi-trash me-1"></i>Delete</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(exams)}">
                            <td colspan="5" class="text-center py-5 text-secondary">No exams found. Start by creating
                                one!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer text-center mt-auto">
        <div class="container text-center">
            <p class="mb-0 text-secondary small">© 2025 Online Exam Pro. Excellence in Evaluation.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
