<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Exam - Online Exam Pro</title>
    <div th:replace="~{fragments :: header_links}"></div>
</head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold text-white mb-0">Edit Exam</h2>
                        <p class="text-secondary small">Update exam settings</p>
                    </div>
                    <a th:href="@{/examiner/exams}" class="btn btn-outline-light rounded-pill px-4">
                        <i class="bi bi-arrow-left me-2"></i>Back to Exams
                    </a>
                </div>

                <div class="glass-card p-4 animate__animated animate__fadeInUp">
                    <form th:action="@{/examiner/exam/update/{id}(id=${exam.id})}" th:object="${exam}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-4">
                            <label for="title" class="form-label text-secondary small text-uppercase fw-bold">Exam Title</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary py-2" id="title" th:field="*{title}" required>
                        </div>

                        <div class="mb-4">
                            <label for="durationInMinutes" class="form-label text-secondary small text-uppercase fw-bold">Duration (Minutes)</label>
                            <input type="number" class="form-control bg-dark text-white border-secondary py-2" id="durationInMinutes" th:field="*{durationInMinutes}" min="1" required>
                        </div>

                        <div class="mt-4 pt-2 border-top border-secondary">
                            <button type="submit" class="btn btn-premium w-100 py-3">
                                <i class="bi bi-save2-fill me-2"></i>Update Exam Settings
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center mt-auto">
        <div class="container">
            <p class="mb-0 text-secondary small">© 2025 Online Exam Pro. Excellence in Evaluation.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
