<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="header_links">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/}">📚 Online Exam <span class="text-info">Pro</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Home</a>
                    </li>

                    <!-- Admin Links -->
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/dashboard}">Admin Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/manage-exams}">Exams</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link text-info fw-bold" th:href="@{/admin/generate-questions}"><i
                                class="bi bi-magic me-1"></i>AI Generator</a>
                    </li>

                    <!-- Examiner Links -->
                    <li class="nav-item" sec:authorize="hasRole('EXAMINER')">
                        <a class="nav-link" th:href="@{/examiner/dashboard}">Examiner Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('EXAMINER')">
                        <a class="nav-link" th:href="@{/examiner/exams}">My Exams</a>
                    </li>

                    <!-- Student Links -->
                    <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                        <a class="nav-link" th:href="@{/student/dashboard}">My Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                        <a class="nav-link" th:href="@{/student/my-results}">My Results</a>
                    </li>
                </ul>

                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="btn btn-outline-light me-2" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="btn btn-premium" th:href="@{/register}">Join Now</a>
                    </li>

                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="navbarDropdown"
                            role="button" data-bs-toggle="dropdown">
                            <img th:if="${globalProfilePicUrl != null}" th:src="@{${globalProfilePicUrl}}"
                                class="rounded-circle me-2"
                                style="width: 32px; height: 32px; object-fit: cover; border: 2px solid #fff;">
                            <i th:if="${globalProfilePicUrl == null}" class="bi bi-person-circle fs-4 me-2"></i>
                            <span sec:authentication="name" class="fw-semibold"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end glass-card border-0 mt-2">
                            <li sec:authorize="hasRole('STUDENT')">
                                <a class="dropdown-item" th:href="@{/student/profile}">👤 My Profile</a>
                            </li>
                            <li>
                                <hr class="dropdown-divider bg-light opacity-25">
                            </li>
                            <li>
                                <a class="dropdown-item text-danger"
                                    href="javascript:document.getElementById('logoutForm').submit();">🚪 Logout</a>
                                <form th:action="@{/logout}" method="post" id="logoutForm" class="d-none"></form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

</body>

</html>
