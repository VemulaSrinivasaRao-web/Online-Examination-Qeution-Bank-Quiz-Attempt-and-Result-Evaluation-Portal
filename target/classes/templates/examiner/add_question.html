<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Question - Online Exam Pro</title>
    <div th:replace="~{fragments :: header_links}"></div>
</head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5 pt-5">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold text-white mb-0">Add New Question</h2>
                        <p class="text-secondary small">Enter question details below</p>
                    </div>
                    <a th:href="@{/examiner/exam/manage-questions/{id}(id=${examId})}" class="btn btn-outline-light rounded-pill px-4">
                        <i class="bi bi-arrow-left me-2"></i>Back to Questions
                    </a>
                </div>

                <div class="glass-card p-4 animate__animated animate__fadeInUp">
                    <form th:action="@{/examiner/exam/question/add}" th:object="${question}" method="post">
                        <input type="hidden" name="examId" th:value="${examId}" />

                        <div class="mb-4">
                            <label for="text" class="form-label text-secondary small text-uppercase fw-bold">Question Text</label>
                            <textarea class="form-control bg-dark text-white border-secondary" id="text" th:field="*{text}" rows="3" required placeholder="Type your question here..."></textarea>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label for="option1" class="form-label text-secondary small text-uppercase">Option 1</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="option1" th:field="*{option1}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="option2" class="form-label text-secondary small text-uppercase">Option 2</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="option2" th:field="*{option2}" required>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label for="option3" class="form-label text-secondary small text-uppercase">Option 3</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="option3" th:field="*{option3}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="option4" class="form-label text-secondary small text-uppercase">Option 4</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="option4" th:field="*{option4}">
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-4 mb-3">
                                <label for="correctAnswer" class="form-label text-secondary small text-uppercase">Correct Answer (1-4)</label>
                                <input type="number" class="form-control bg-dark text-white border-secondary" id="correctAnswer" th:field="*{correctAnswer}" min="1" max="4" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="marks" class="form-label text-secondary small text-uppercase">Marks</label>
                                <input type="number" class="form-control bg-dark text-white border-secondary" id="marks" th:field="*{marks}" min="1" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="difficulty" class="form-label text-secondary small text-uppercase">Difficulty</label>
                                <select class="form-select bg-dark text-white border-secondary" id="difficulty" th:field="*{difficulty}">
                                    <option value="Easy">Easy</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Hard">Hard</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-4 pt-2 border-top border-secondary">
                            <button type="submit" class="btn btn-premium w-100 py-3">
                                <i class="bi bi-check-circle-fill me-2"></i>Save Question
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center mt-auto">
        <div class="container">
            <p class="mb-0 text-secondary small">© 2025 Online Exam Pro. Excellence in Evaluation.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
