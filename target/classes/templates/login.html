<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - Online Exam Pro</title>
    <div th:replace="~{fragments :: header_links}"></div>
</head>

<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5 pt-5">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-white">Welcome Back</h2>
                        <p class="text-secondary small">Login to access your dashboard</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger bg-danger text-white border-0 small">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success bg-success text-white border-0 small">
                        <i class="bi bi-check-circle-fill me-2"></i> You have been logged out.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-4">
                            <label for="username" class="form-label text-secondary small">Username (Email)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle">
                                    <i class="bi bi-envelope text-info"></i>
                                </span>
                                <input type="text" class="form-control border-start-0 ps-0" id="username"
                                    name="username" required autofocus placeholder="Enter your email">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label text-secondary small">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle">
                                    <i class="bi bi-lock text-info"></i>
                                </span>
                                <input type="password" class="form-control border-start-0 ps-0" id="password"
                                    name="password" required placeholder="Enter your password">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-premium w-100 py-3 mt-2">Login to Account</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-secondary small">New user? <a th:href="@{/register}"
                                class="text-info fw-semibold text-decoration-none">Create an account</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center mt-auto">
        <div class="container text-center">
            <p class="mb-0 text-secondary small">© 2025 Online Exam Pro. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
